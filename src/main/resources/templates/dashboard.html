<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">📋 Task Manager</span>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
</nav>

<div class="container mt-4">

    <!-- Create Task Form -->
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">Create New Task</div>
        <div class="card-body">
            <form th:action="@{/tasks/create}" th:object="${taskDTO}" method="post">
                <div class="row g-2">
                    <div class="col-md-3">
                        <input type="text" th:field="*{title}" class="form-control" placeholder="Title" required>
                        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger small"></span>
                    </div>
                    <div class="col-md-3">
                        <input type="text" th:field="*{description}" class="form-control" placeholder="Description">
                    </div>
                    <div class="col-md-2">
                        <input type="date" th:field="*{dueDate}" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <select th:field="*{priority}" class="form-select">
                            <option value="">Priority</option>
                            <option value="HIGH">High</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="LOW">Low</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Add Task</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Table -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">My Tasks</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-secondary">
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Due Date</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(tasks)}">
                        <td colspan="6" class="text-center text-muted py-4">No tasks yet. Create one above!</td>
                    </tr>
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.title}"></td>
                        <td th:text="${task.description}"></td>
                        <td th:text="${task.dueDate}"></td>
                        <td>
                            <span th:text="${task.priority}"
                                  th:classappend="${task.priority == 'HIGH'} ? 'badge bg-danger' : (${task.priority == 'MEDIUM'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')">
                            </span>
                        </td>
                        <td>
                            <span th:text="${task.status}"
                                  th:classappend="${task.status.name() == 'COMPLETED'} ? 'badge bg-success' : (${task.status.name() == 'IN_PROGRESS'} ? 'badge bg-primary' : 'badge bg-secondary')">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Delete this task?')">Delete</a>

                            <div class="btn-group btn-group-sm ms-1">
                                <a th:href="@{/tasks/status/{id}/{status}(id=${task.id},status='PENDING')}"
                                   class="btn btn-outline-secondary">Pending</a>
                                <a th:href="@{/tasks/status/{id}/{status}(id=${task.id},status='IN_PROGRESS')}"
                                   class="btn btn-outline-primary">In Progress</a>
                                <a th:href="@{/tasks/status/{id}/{status}(id=${task.id},status='COMPLETED')}"
                                   class="btn btn-outline-success">Done</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
