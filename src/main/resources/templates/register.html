<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Task Manager</h3>
                        <h5 class="text-center text-muted mb-4">Register</h5>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/register}" th:object="${registerDTO}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name">
                                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></span>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email">
                                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 characters">
                                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Register</button>
                        </form>

                        <p class="text-center mt-3">
                            Already have an account? <a th:href="@{/login}">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
